<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Learning Twine</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f8fb;
      color: #1f2937;
      line-height: 1.6;
    }

    nav {
      background: #0f172a;
      padding: 14px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav ul, footer ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    nav a, footer a {
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
    }

    nav a:hover, footer a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .hero {
      background: white;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 2.1rem;
    }

    .hero p {
      margin: 0;
      color: #4b5563;
      font-size: 1.05rem;
    }

    .section {
      background: white;
      padding: 22px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      margin-bottom: 18px;
    }

    .section h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.3rem;
      color: #0f172a;
    }

    .links {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .link-card {
      display: block;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      padding: 14px 16px;
      border-radius: 12px;
      color: #2563eb;
      text-decoration: none;
      word-break: break-word;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.08);
      text-decoration: underline;
    }

    footer {
      margin-top: 40px;
      background: #0f172a;
      padding: 18px 24px;
    }

    @media (max-width: 700px) {
      nav ul, footer ul {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <nav>
    <ul>
      <li><a href="http://argentenum.github.io/">Home</a></li>
      <li><a href="http://argentenum.github.io/Slides.html">Slides</a></li>
      <li><a href="http://argentenum.github.io/repos">Repositories</a></li>
      <li><a href="http://argentenum.github.io/links.html">Links</a></li>
    </ul>
  </nav>

  <div class="container">
    <section class="hero">
      <h1>Learning Twine</h1>
      <p>Resources for interactive storytelling and non-linear digital narratives.</p>
    </section>

    <section class="section">
      <h2>Twine workshop</h2>
      <div class="links">
        <a class="link-card" href="https://argentenum.itch.io/">Try interactive stories</a>
        <a class="link-card" href="https://twinery.org/">Twine is an open-source tool for non-linear storytelling</a>
      </div>
    </section>
  </div>

  <footer>
    <ul>
      <li><a href="https://www.arjunghosh.in">arjunghosh.in</a></li>
    </ul>
  </footer>
</body>
</html>
