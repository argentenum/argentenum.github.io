<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slides</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f8fb;
      color: #1f2937;
      line-height: 1.6;
    }

    nav {
      background: #0f172a;
      padding: 14px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 42px 20px;
    }

    .hero {
      background: white;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      padding: 28px;
      margin-bottom: 24px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    p.lead {
      margin-top: 0;
      color: #4b5563;
      font-size: 1.05rem;
    }

    .link-list {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    .link-card {
      background: white;
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(15, 23, 42, 0.10);
    }

    .link-card a {
      color: #2563eb;
      text-decoration: none;
      word-break: break-word;
    }

    .link-card a:hover {
      text-decoration: underline;
    }

    footer {
      background: #0f172a;
      color: white;
      padding: 18px 24px;
      margin-top: 40px;
    }

    footer ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
    }

    footer a {
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      nav ul,
      footer ul {
        justify-content: center;
      }

      nav {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <nav>
    <ul>
      <li><a href="http://argentenum.github.io/">Home</a></li>
      <li><a href="http://argentenum.github.io/Slides.html">Slides</a></li>
      <li><a href="http://argentenum.github.io/repos">Repositories</a></li>
      <li><a href="http://argentenum.github.io/links.html">Links</a></li>
    </ul>
  </nav>

  <div class="container">
    <section class="hero">
      <h1>Slides</h1>
      <p class="lead">A small collection of presentation pages and slide decks.</p>
    </section>

    <div class="link-list">
      <div class="link-card">
        <a href="https://argentenum.github.io//remarkHome.html">https://argentenum.github.io//remarkHome.html</a>
      </div>

      <div class="link-card">
        <a href="https://argentenum.github.io/revealSlides/dh.html">https://argentenum.github.io/revealSlides/dh.html</a>
      </div>
    </div>
  </div>

  <footer>
    <ul>
      <li><a href="https://www.arjunghosh.in">arjunghosh.in</a></li>
    </ul>
  </footer>
</body>
</html>
